<!doctype html>
<html lang="en">
  <head>
    <!-- 🔹 FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/nohemi" />
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- 🔹 BASIC META -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔥 TITLE (VERY IMPORTANT FOR SEO) -->
    <title>Parklane Resort | Luxury Resort in Dhanbad & Jamshedpur for Stay, Wedding & Events</title>

    <!-- 🔥 META DESCRIPTION -->
    <meta
      name="description"
      content="Parklane Resort is a premium luxury resort near Dhanbad & Jamshedpur offering comfortable rooms, wedding venue, family stay, parties, and peaceful nature retreat. Book now on WhatsApp."
    />

    <!-- 🔥 KEYWORDS -->
    <meta
      name="keywords"
      content="Parklane Resort, resort in Dhanbad, resort in Jamshedpur, best resort in Jharkhand, wedding resort Dhanbad, party venue Jamshedpur, family resort Jharkhand, luxury resort near me, resort for couples, resort booking Jharkhand"
    />

    <meta name="author" content="Parklane Resort" />
    <meta name="robots" content="index, follow" />

    <!-- 🔹 FAVICON -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- 🔥 OPEN GRAPH (GOOGLE + WHATSAPP SHARE) -->
    <meta property="og:title" content="Parklane Resort – Luxury Stay, Wedding & Events in Jharkhand" />
    <meta
      property="og:description"
      content="Enjoy a peaceful and luxurious stay at Parklane Resort. Perfect for weddings, parties, family stays, and weekend getaways near Dhanbad & Jamshedpur."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://parklaneresort.com" />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- 🔹 TWITTER PREVIEW -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Parklane Resort – Luxury Stay & Wedding Destination" />
    <meta
      name="twitter:description"
      content="Best resort in Jharkhand for stay, weddings, parties, and nature retreats. Book your stay now."
    />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- 🔥 STRUCTURED DATA (VERY POWERFUL SEO BOOST) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Resort",
        "name": "Parklane Resort",
        "image": "/og-image.jpg",
        "url": "https://parklaneresort.com",
        "telephone": "+91-9031821122",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Dhanbad",
          "addressRegion": "Jharkhand",
          "postalCode": "826001",
          "addressCountry": "IN"
        },
        "description": "Parklane Resort is a luxury resort in Jharkhand offering rooms, wedding venue, party space, and peaceful stay near Dhanbad and Jamshedpur.",
        "amenityFeature": [
          { "@type": "LocationFeatureSpecification", "name": "Free Parking" },
          { "@type": "LocationFeatureSpecification", "name": "Event Space" },
          { "@type": "LocationFeatureSpecification", "name": "Family Rooms" },
          { "@type": "LocationFeatureSpecification", "name": "Garden Area" }
        ],
        "sameAs": [
          "https://www.instagram.com/",
          "https://www.facebook.com/"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
